<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>실속형 퇴직연금 급여계산기</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Pretendard', sans-serif; background-color: #f8f9fa; }
        .glass-panel { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-6xl mx-auto">

        <div class="mb-8 border-b pb-4">
            <h1 class="text-3xl font-bold text-gray-900 mb-2 tracking-tight">퇴직연금 급여계산기</h1>
            <p class="text-gray-500 text-sm">개인별과세소득액내역서 기반으로 산출하였습니다.</p>
        </div>

        <!-- 전체 요약 패널 (상단 고정) -->
        <div class="glass-panel rounded-2xl shadow-sm border border-green-200 p-6 mb-10 sticky top-4 z-10">
            <h2 class="text-lg font-bold text-gray-800 mb-4 flex items-center">
                <span class="w-6 h-6 rounded bg-green-100 text-green-700 flex items-center justify-center mr-2 text-xs font-bold">합</span>
                전체 퇴직급여 요약
            </h2>
            <div class="overflow-x-auto">
                <table class="w-full text-sm">
                    <thead>
                        <tr class="border-b border-gray-200 text-xs font-semibold text-gray-500">
                            <th class="text-left pb-2 pr-4 w-10">번호</th>
                            <th class="text-left pb-2 pr-4">성명</th>
                            <th class="text-left pb-2 pr-4">교번</th>
                            <th class="text-right pb-2">퇴직급여</th>
                        </tr>
                    </thead>
                    <tbody id="summaryTableBody">
                        <tr>
                            <td colspan="4" class="py-3 text-center text-gray-400 text-xs">입력된 정보가 없습니다.</td>
                        </tr>
                    </tbody>
                    <tfoot>
                        <tr class="border-t-2 border-gray-300">
                            <td colspan="3" class="pt-3 font-bold text-gray-700 text-sm">합계</td>
                            <td class="pt-3 text-right text-xl font-black text-green-600" id="summaryTotal">0원</td>
                        </tr>
                    </tfoot>
                </table>
            </div>
        </div>

        <!-- 직원 폼 목록 -->
        <div id="personsContainer" class="space-y-12"></div>

        <!-- 추가 버튼 -->
        <div class="mt-10 text-center">
            <button onclick="addPerson()" class="bg-blue-600 hover:bg-blue-700 active:bg-blue-800 text-white font-bold px-8 py-3 rounded-xl transition shadow-md text-base">
                + 직원 추가
            </button>
        </div>

    </div>

    <script>
        let persons = [];

        function createPerson() {
            return {
                empName: '',
                empId: '',
                startDate: '',
                endDate: '',
                totalBase: 0,
                firstBase: 0,
                lastBase: 0,
                extraPays: [],
                severance: 0,
                totalWage: 0
            };
        }

        function parseNum(str) {
            return parseInt((str || '').replace(/,/g, '')) || 0;
        }

        function formatNumber(input) {
            let value = input.value.replace(/[^0-9]/g, '');
            input.value = value ? Number(value).toLocaleString() : '';
        }

        function getDaysInMonth(year, month) {
            return new Date(year, month, 0).getDate();
        }

        function syncField(idx, field, value) {
            persons[idx][field] = value;
        }

        function addExtraPay(idx) {
            persons[idx].extraPays.push({ label: '', amount: 0, excluded: false });
            renderExtraPays(idx);
            calculatePerson(idx);
        }

        function removeExtraPay(idx, ei) {
            persons[idx].extraPays.splice(ei, 1);
            renderExtraPays(idx);
            calculatePerson(idx);
        }

        function updateExtra(idx, ei, key, value) {
            persons[idx].extraPays[ei][key] = key === 'amount'
                ? (Number(value.replace(/[^0-9]/g, '')) || 0)
                : value;
            calculatePerson(idx);
        }

        function renderExtraPays(idx) {
            const container = document.getElementById(`extraPayContainer-${idx}`);
            if (!container) return;
            container.innerHTML = persons[idx].extraPays.map((item, ei) => `
                <div class="grid grid-cols-12 gap-2 px-4 py-3 items-center hover:bg-gray-100 transition">
                    <div class="col-span-4">
                        <input type="text" value="${item.label}" onchange="updateExtra(${idx}, ${ei}, 'label', this.value)"
                            class="w-full bg-transparent border-none text-sm text-gray-700 focus:ring-0 p-0" placeholder="항목명">
                    </div>
                    <div class="col-span-4">
                        <input type="text" value="${Number(item.amount).toLocaleString()}"
                            oninput="formatNumber(this); updateExtra(${idx}, ${ei}, 'amount', this.value)"
                            class="w-full bg-transparent border-none text-sm font-medium text-blue-600 text-right focus:ring-0 p-0" placeholder="0">
                    </div>
                    <div class="col-span-3 text-center flex items-center justify-center">
                        <input type="checkbox" ${item.excluded ? 'checked' : ''}
                            onchange="updateExtra(${idx}, ${ei}, 'excluded', this.checked)"
                            class="w-4 h-4 text-blue-600 rounded border-gray-300 focus:ring-blue-500 cursor-pointer">
                    </div>
                    <div class="col-span-1 text-center">
                        <button onclick="removeExtraPay(${idx}, ${ei})" class="text-red-400 hover:text-red-600">
                            <svg class="w-4 h-4 mx-auto" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
                            </svg>
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function getPersonHTML(idx) {
            const p = persons[idx];
            const canDelete = persons.length > 1;
            return `
            <div id="person-section-${idx}" class="border-t-4 border-blue-100 pt-8">
                <div class="flex justify-between items-center mb-6">
                    <div class="flex items-center gap-3">
                        <span class="w-8 h-8 rounded-full bg-blue-600 text-white flex items-center justify-center font-bold text-sm">${idx + 1}</span>
                        <h2 class="text-xl font-bold text-gray-800">직원 ${idx + 1}</h2>
                    </div>
                    ${canDelete ? `
                    <button onclick="removePerson(${idx})"
                        class="text-xs text-red-500 border border-red-300 hover:bg-red-50 px-3 py-1.5 rounded-lg transition font-semibold">
                        삭제
                    </button>` : ''}
                </div>
                <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
                    <div class="lg:col-span-7 space-y-6">

                        <div class="glass-panel rounded-2xl shadow-sm border border-gray-200 p-6">
                            <h3 class="text-lg font-bold text-gray-800 mb-4 flex items-center">
                                <span class="w-6 h-6 rounded bg-blue-100 text-blue-600 flex items-center justify-center mr-2 text-xs">1</span>
                                기본 정보 및 기산일
                            </h3>
                            <div class="grid grid-cols-2 gap-4 mb-4">
                                <div>
                                    <label class="block text-xs font-semibold text-gray-600 mb-1">성명</label>
                                    <input type="text" id="empName-${idx}" value="${p.empName}"
                                        oninput="syncField(${idx}, 'empName', this.value); calculatePerson(${idx})"
                                        class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500 focus:outline-none">
                                </div>
                                <div>
                                    <label class="block text-xs font-semibold text-gray-600 mb-1">교번</label>
                                    <input type="text" id="empId-${idx}" value="${p.empId}"
                                        oninput="syncField(${idx}, 'empId', this.value); calculatePerson(${idx})"
                                        class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500 focus:outline-none">
                                </div>
                            </div>
                            <div class="grid grid-cols-2 gap-4">
                                <div>
                                    <label class="block text-xs font-semibold text-gray-600 mb-1">입사일 (기산 시작)</label>
                                    <input type="date" id="startDate-${idx}" value="${p.startDate}"
                                        onchange="syncField(${idx}, 'startDate', this.value); calculatePerson(${idx})"
                                        class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500 focus:outline-none">
                                </div>
                                <div>
                                    <label class="block text-xs font-semibold text-gray-600 mb-1">퇴직일 (기산 종료)</label>
                                    <input type="date" id="endDate-${idx}" value="${p.endDate}"
                                        onchange="syncField(${idx}, 'endDate', this.value); calculatePerson(${idx})"
                                        class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500 focus:outline-none">
                                </div>
                            </div>
                        </div>

                        <div class="glass-panel rounded-2xl shadow-sm border border-gray-200 p-6">
                            <h3 class="text-lg font-bold text-gray-800 mb-2 flex items-center">
                                <span class="w-6 h-6 rounded bg-blue-100 text-blue-600 flex items-center justify-center mr-2 text-xs">2</span>
                                급여지급액 직접 입력
                            </h3>
                            <p class="text-xs text-gray-500 mb-5">명세서에 표기된 1년치 기본급여 총계와, 일할 계산이 필요한 첫 달/마지막 달의 금액을 입력해 주세요.</p>
                            <div class="space-y-4">
                                <div>
                                    <label class="block text-sm font-bold text-gray-800 mb-1">1년치 급여지급액 총합계
                                        <span class="text-xs font-normal text-gray-400 ml-1">(과세별도 수당 제외)</span>
                                    </label>
                                    <div class="relative">
                                        <input type="text" id="totalBase-${idx}" value="${p.totalBase ? Number(p.totalBase).toLocaleString() : ''}"
                                            oninput="formatNumber(this); syncField(${idx}, 'totalBase', parseNum(this.value)); calculatePerson(${idx})"
                                            class="w-full border border-gray-300 rounded-lg px-4 py-3 text-lg font-bold text-right focus:ring-2 focus:ring-blue-500 focus:outline-none pr-8">
                                        <span class="absolute right-3 top-3.5 text-gray-500">원</span>
                                    </div>
                                </div>
                                <div class="grid grid-cols-2 gap-4 pt-2">
                                    <div>
                                        <label class="block text-xs font-semibold text-gray-600 mb-1">첫 달 급여지급액
                                            <span class="text-gray-400">(안분 대상)</span>
                                        </label>
                                        <div class="relative">
                                            <input type="text" id="firstBase-${idx}" value="${p.firstBase ? Number(p.firstBase).toLocaleString() : ''}"
                                                oninput="formatNumber(this); syncField(${idx}, 'firstBase', parseNum(this.value)); calculatePerson(${idx})"
                                                class="w-full border border-gray-300 rounded-lg px-3 py-2 text-right focus:ring-2 focus:ring-blue-500 focus:outline-none pr-8">
                                            <span class="absolute right-3 top-2.5 text-gray-500 text-sm">원</span>
                                        </div>
                                    </div>
                                    <div>
                                        <label class="block text-xs font-semibold text-gray-600 mb-1">마지막 달 급여지급액
                                            <span class="text-gray-400">(안분 대상)</span>
                                        </label>
                                        <div class="relative">
                                            <input type="text" id="lastBase-${idx}" value="${p.lastBase ? Number(p.lastBase).toLocaleString() : ''}"
                                                oninput="formatNumber(this); syncField(${idx}, 'lastBase', parseNum(this.value)); calculatePerson(${idx})"
                                                class="w-full border border-gray-300 rounded-lg px-3 py-2 text-right focus:ring-2 focus:ring-blue-500 focus:outline-none pr-8">
                                            <span class="absolute right-3 top-2.5 text-gray-500 text-sm">원</span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="glass-panel rounded-2xl shadow-sm border border-gray-200 p-6">
                            <div class="flex justify-between items-center mb-4">
                                <h3 class="text-lg font-bold text-gray-800 flex items-center">
                                    <span class="w-6 h-6 rounded bg-blue-100 text-blue-600 flex items-center justify-center mr-2 text-xs">3</span>
                                    과세별도기지급액 관리
                                </h3>
                                <button onclick="addExtraPay(${idx})"
                                    class="text-xs bg-gray-100 text-gray-700 font-semibold px-3 py-1.5 rounded-lg hover:bg-gray-200 transition">
                                    + 항목 추가
                                </button>
                            </div>
                            <div class="bg-gray-50 rounded-xl border border-gray-200 p-1">
                                <div class="grid grid-cols-12 gap-2 px-4 py-2 border-b border-gray-200 text-xs font-semibold text-gray-500 text-center">
                                    <div class="col-span-4 text-left">수당명 / 메모</div>
                                    <div class="col-span-4 text-right">금액(원)</div>
                                    <div class="col-span-3">일회성 제외</div>
                                    <div class="col-span-1">삭제</div>
                                </div>
                                <div id="extraPayContainer-${idx}" class="divide-y divide-gray-100"></div>
                            </div>
                        </div>

                    </div>

                    <div class="lg:col-span-5">
                        <div class="bg-gray-900 rounded-2xl shadow-xl p-6 md:p-8 text-white">
                            <h3 class="text-lg font-bold text-gray-100 mb-6 flex items-center border-b border-gray-700 pb-4">
                                <span class="w-6 h-6 rounded bg-blue-500 text-white flex items-center justify-center mr-2 text-xs">결과</span>
                                최종 산출 내역
                            </h3>
                            <div class="space-y-6 mb-8">
                                <div class="flex justify-between items-center text-sm">
                                    <span class="text-gray-400">1. 성명</span>
                                    <span class="font-medium" id="resName-${idx}">-</span>
                                </div>
                                <div class="flex justify-between items-center text-sm">
                                    <span class="text-gray-400">2. 교번</span>
                                    <span class="font-medium" id="resId-${idx}">-</span>
                                </div>
                                <div class="pt-4 border-t border-gray-800">
                                    <span class="text-gray-400 text-sm block mb-1">3. 산출된 임금총액 (A)</span>
                                    <div class="text-3xl font-bold text-blue-400 text-right" id="resTotalWage-${idx}">0원</div>
                                </div>
                                <div class="pt-4 border-t border-gray-800">
                                    <span class="text-gray-400 text-sm block mb-1">4. 예상 퇴직급여 (A ÷ 12)</span>
                                    <div class="text-4xl font-black text-white text-right tracking-tight" id="resSeverance-${idx}">0원</div>
                                </div>
                            </div>
                            <div class="bg-gray-800 p-5 rounded-xl border border-gray-700">
                                <h4 class="text-sm font-bold text-gray-300 mb-2">5. 계산 방법 안내</h4>
                                <p class="text-xs text-gray-400 leading-relaxed break-keep" id="resDescription-${idx}"></p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            `;
        }

        function renderAllPersons() {
            const container = document.getElementById('personsContainer');
            container.innerHTML = persons.map((_, i) => getPersonHTML(i)).join('');
            persons.forEach((_, i) => renderExtraPays(i));
        }

        function addPerson() {
            persons.push(createPerson());
            renderAllPersons();
            calculateAll();
            const newSection = document.getElementById(`person-section-${persons.length - 1}`);
            if (newSection) newSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        function removePerson(idx) {
            if (persons.length <= 1) return;
            persons.splice(idx, 1);
            renderAllPersons();
            calculateAll();
        }

        function calculatePerson(idx) {
            const p = persons[idx];

            const el = (id) => document.getElementById(id);
            el(`resName-${idx}`).innerText = p.empName || '-';
            el(`resId-${idx}`).innerText = p.empId || '-';

            const middleSum = p.totalBase - p.firstBase - p.lastBase;
            let proratedFirst = 0, proratedLast = 0;
            let startTotal = 0, startWorked = 0, endTotal = 0, endWorked = 0;

            if (p.startDate && p.endDate) {
                const startD = new Date(p.startDate);
                startTotal = getDaysInMonth(startD.getFullYear(), startD.getMonth() + 1);
                startWorked = startTotal - startD.getDate() + 1;
                proratedFirst = (p.firstBase / startTotal) * startWorked;

                const endD = new Date(p.endDate);
                endTotal = getDaysInMonth(endD.getFullYear(), endD.getMonth() + 1);
                endWorked = endD.getDate();
                proratedLast = (p.lastBase / endTotal) * endWorked;
            }

            let includedExtra = 0, excludedCount = 0;
            p.extraPays.forEach(item => {
                if (item.excluded) excludedCount++;
                else includedExtra += item.amount;
            });

            const explanation = (p.startDate && p.endDate)
                ? `총 13개월의 데이터 중 온전한 중간 11개월분은 전액 반영되었으며, 첫 달은 ${startTotal}일 중 <b>${startWorked}일</b>, 마지막 달은 ${endTotal}일 중 <b>${endWorked}일</b>에 비례하여 일할 계산(안분)되었습니다. 또한, 과세별도기지급액 중 일회성으로 체크된 <b>${excludedCount}건</b>을 제외한 비일회성 항목이 임금총액에 합산되었습니다. 최종 산출된 임금총액을 12로 나누어 예상 퇴직급여를 도출합니다.`
                : `급여지급액 총합계와 과세별도기지급액을 기반으로 임금총액을 산출하였으며, 과세별도기지급액 중 일회성으로 체크된 <b>${excludedCount}건</b>을 제외한 비일회성 항목이 합산되었습니다. 최종 산출된 임금총액을 12로 나누어 예상 퇴직급여를 도출합니다.`;

            const finalWage = proratedFirst + middleSum + proratedLast + includedExtra;
            p.totalWage = Math.round(finalWage);
            p.severance = Math.round(finalWage / 12);

            el(`resTotalWage-${idx}`).innerText = p.totalWage.toLocaleString() + '원';
            el(`resSeverance-${idx}`).innerText = p.severance.toLocaleString() + '원';
            el(`resDescription-${idx}`).innerHTML = explanation;

            renderSummary();
        }

        function calculateAll() {
            persons.forEach((_, i) => calculatePerson(i));
        }

        function renderSummary() {
            const tbody = document.getElementById('summaryTableBody');
            let total = 0;

            if (persons.length === 0) {
                tbody.innerHTML = `<tr><td colspan="4" class="py-3 text-center text-gray-400 text-xs">입력된 정보가 없습니다.</td></tr>`;
                document.getElementById('summaryTotal').innerText = '0원';
                return;
            }

            tbody.innerHTML = persons.map((p, i) => {
                total += p.severance || 0;
                return `
                <tr class="border-b border-gray-100 hover:bg-green-50 transition">
                    <td class="py-2.5 pr-4 text-gray-400 text-xs">${i + 1}</td>
                    <td class="py-2.5 pr-4 font-semibold text-gray-800">${p.empName || '<span class="text-gray-300">미입력</span>'}</td>
                    <td class="py-2.5 pr-4 text-gray-500">${p.empId || '<span class="text-gray-300">-</span>'}</td>
                    <td class="py-2.5 text-right font-bold text-blue-600">${(p.severance || 0).toLocaleString()}원</td>
                </tr>`;
            }).join('');

            document.getElementById('summaryTotal').innerText = total.toLocaleString() + '원';
        }

        // 초기화
        persons.push(createPerson());
        renderAllPersons();
        calculateAll();
    </script>
</body>
</html>
