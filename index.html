<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>퇴직연금 급여계산기</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Pretendard', sans-serif; background-color: #f3f4f6; }
    </style>
</head>
<body class="p-6 md:p-12">

    <div class="max-w-5xl mx-auto">
        <div class="mb-8">
            <h1 class="text-3xl font-bold text-gray-900 mb-2">퇴직연금 급여계산기</h1>
            <p class="text-gray-500">개인별과세소득액내역을 바탕으로 임금총액 및 퇴직급여를 산출합니다.</p>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-8">
                <h2 class="text-xl font-bold text-gray-800 mb-6 flex items-center">
                    <span class="w-8 h-8 rounded-lg bg-blue-100 text-blue-600 flex items-center justify-center mr-3 text-sm">1</span>
                    데이터 입력 및 설정
                </h2>

                <div class="mb-8 p-4 bg-gray-50 border border-dashed border-gray-300 rounded-xl text-center">
                    <p class="text-sm text-gray-500 mb-2">📄 개인별과세소득액내역 이미지 로드 완료</p>
                    <p class="text-xs text-blue-600 font-medium">데이터 추출 성공: 총 13개월 내역 인식됨</p>
                </div>

                <div class="mb-8">
                    <h3 class="text-sm font-bold text-gray-700 mb-3">근무일수 설정 (일할 계산용)</h3>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs text-gray-500 mb-1">첫 달 (23년 12월)</label>
                            <div class="relative">
                                <input type="number" id="firstMonthDays" value="18" max="31" min="0" oninput="calculate()"
                                    class="w-full border border-gray-300 rounded-lg px-4 py-2 text-gray-700 focus:ring-2 focus:ring-blue-500 focus:outline-none text-right">
                                <span class="absolute right-10 top-2.5 text-gray-400 text-sm">일</span>
                            </div>
                        </div>
                        <div>
                            <label class="block text-xs text-gray-500 mb-1">마지막 달 (24년 12월)</label>
                            <div class="relative">
                                <input type="number" id="lastMonthDays" value="13" max="31" min="0" oninput="calculate()"
                                    class="w-full border border-gray-300 rounded-lg px-4 py-2 text-gray-700 focus:ring-2 focus:ring-blue-500 focus:outline-none text-right">
                                <span class="absolute right-10 top-2.5 text-gray-400 text-sm">일</span>
                            </div>
                        </div>
                    </div>
                </div>

                <div>
                    <div class="flex justify-between items-end mb-3">
                        <h3 class="text-sm font-bold text-gray-700">과세별도기지급액 (일회성 항목 제외)</h3>
                        <span class="text-xs text-gray-400">체크 시 임금총액에서 차감</span>
                    </div>
                    <div class="space-y-3 bg-gray-50 p-4 rounded-xl border border-gray-100">
                        <label class="flex items-center justify-between cursor-pointer hover:bg-gray-100 p-2 rounded-md transition">
                            <div class="flex items-center">
                                <input type="checkbox" id="chk1" onchange="calculate()" class="w-4 h-4 text-blue-600 rounded border-gray-300 focus:ring-blue-500">
                                <span class="ml-3 text-sm text-gray-700">23년 12월 지급분</span>
                            </div>
                            <span class="text-sm font-medium text-gray-900">600,000원</span>
                        </label>
                        <label class="flex items-center justify-between cursor-pointer hover:bg-gray-100 p-2 rounded-md transition">
                            <div class="flex items-center">
                                <input type="checkbox" id="chk2" onchange="calculate()" class="w-4 h-4 text-blue-600 rounded border-gray-300 focus:ring-blue-500">
                                <span class="ml-3 text-sm text-gray-700">24년 03월 지급분</span>
                            </div>
                            <span class="text-sm font-medium text-gray-900">120,000원</span>
                        </label>
                        <label class="flex items-center justify-between cursor-pointer hover:bg-gray-100 p-2 rounded-md transition">
                            <div class="flex items-center">
                                <input type="checkbox" id="chk3" onchange="calculate()" class="w-4 h-4 text-blue-600 rounded border-gray-300 focus:ring-blue-500">
                                <span class="ml-3 text-sm text-gray-700">24년 11월 지급분</span>
                            </div>
                            <span class="text-sm font-medium text-gray-900">2,474,440원</span>
                        </label>
                        <label class="flex items-center justify-between cursor-pointer hover:bg-gray-100 p-2 rounded-md transition">
                            <div class="flex items-center">
                                <input type="checkbox" id="chk4" onchange="calculate()" class="w-4 h-4 text-blue-600 rounded border-gray-300 focus:ring-blue-500">
                                <span class="ml-3 text-sm text-gray-700">24년 12월 지급분</span>
                            </div>
                            <span class="text-sm font-medium text-gray-900">400,000원</span>
                        </label>
                    </div>
                </div>
            </div>

            <div class="bg-gray-900 rounded-2xl shadow-xl p-8 text-white flex flex-col h-full relative overflow-hidden">
                <div class="absolute -right-20 -top-20 w-64 h-64 bg-blue-500 rounded-full mix-blend-multiply filter blur-3xl opacity-20"></div>

                <h2 class="text-xl font-bold text-gray-100 mb-8 flex items-center relative z-10">
                    <span class="w-8 h-8 rounded-lg bg-blue-900/50 text-blue-400 flex items-center justify-center mr-3 text-sm">2</span>
                    최종 산출 결과
                </h2>

                <div class="space-y-6 flex-1 relative z-10">
                    <div class="flex justify-between items-center border-b border-gray-700 pb-4">
                        <span class="text-gray-400">1. 성명</span>
                        <span class="text-lg font-medium">곽소현</span>
                    </div>
                    <div class="flex justify-between items-center border-b border-gray-700 pb-4">
                        <span class="text-gray-400">2. 교직원 번호 (교번)</span>
                        <span class="text-lg font-medium">210817</span>
                    </div>

                    <div class="pt-4">
                        <span class="text-gray-400 block mb-2">3. 산출된 임금총액 (A)</span>
                        <div class="text-3xl font-bold text-blue-400 text-right" id="resultWage">0원</div>
                    </div>

                    <div class="pt-4 mb-8">
                        <span class="text-gray-400 block mb-2">4. 예상 퇴직급여 (A ÷ 12)</span>
                        <div class="text-4xl font-black text-white text-right" id="resultSeverance">0원</div>
                    </div>
                </div>

                <div class="mt-auto bg-gray-800 p-5 rounded-xl border border-gray-700 relative z-10">
                    <h4 class="text-sm font-bold text-gray-300 mb-2">5. 계산 방법 안내</h4>
                    <p class="text-xs text-gray-400 leading-relaxed break-keep" id="resultDescription">
                        </p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 초기 데이터 (이미지에서 추출된 고정값)
        const DATA = {
            baseFirstMonth: 3396660, // 23년 12월
            baseLastMonth: 4210540,  // 24년 12월
            baseMiddleSum: 47964750, // 24년 1월 ~ 11월 기본급여 합계
            extraPay: [600000, 120000, 2474440, 400000] // 과세별도기지급액
        };

        function calculate() {
            // 1. 입력값 가져오기
            const firstDays = parseInt(document.getElementById('firstMonthDays').value) || 0;
            const lastDays = parseInt(document.getElementById('lastMonthDays').value) || 0;

            // 2. 일할 계산 (안분)
            const proratedFirst = (DATA.baseFirstMonth / 31) * firstDays;
            const proratedLast = (DATA.baseLastMonth / 31) * lastDays;

            // 3. 비일회성(포함할) 수당 합산
            let includedExtraPay = 0;
            let excludedCount = 0;
            if(!document.getElementById('chk1').checked) includedExtraPay += DATA.extraPay[0]; else excludedCount++;
            if(!document.getElementById('chk2').checked) includedExtraPay += DATA.extraPay[1]; else excludedCount++;
            if(!document.getElementById('chk3').checked) includedExtraPay += DATA.extraPay[2]; else excludedCount++;
            if(!document.getElementById('chk4').checked) includedExtraPay += DATA.extraPay[3]; else excludedCount++;

            // 4. 최종 계산
            const totalWage = proratedFirst + DATA.baseMiddleSum + proratedLast + includedExtraPay;
            const severance = totalWage / 12;

            // 5. 화면 렌더링
            document.getElementById('resultWage').innerText = Math.round(totalWage).toLocaleString() + '원';
            document.getElementById('resultSeverance').innerText = Math.round(severance).toLocaleString() + '원';

            // 6. 설명 문구 동적 생성
            const desc = `총 13개월의 데이터 중 온전한 중간 11개월분은 전액 반영되었으며,
            첫 달은 31일 중 <b>${firstDays}일</b>, 마지막 달은 31일 중 <b>${lastDays}일</b>에 비례하여 일할 계산(안분)되었습니다.
            또한, 과세별도기지급액 중 일회성으로 체크된 <b>${excludedCount}건</b>을 제외한 비일회성 항목이 임금총액에 합산되었습니다.
            최종 산출된 임금총액을 12로 나누어 예상 퇴직급여를 도출합니다.`;

            document.getElementById('resultDescription').innerHTML = desc;
        }

        // 페이지 로드 시 최초 1회 계산 실행
        window.onload = calculate;
    </script>
</body>
</html>
